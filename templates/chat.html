<script src="chatLogic.js"></script>

<body>
    <div class="app-container">
        
        <div class="chat-panel">
            <div class="chat-header">
                <div id="headerContent">
                    <h2>Conectando...</h2>
                </div>
            </div>
            
            <ul id="messages" class="messages-list"></ul>
            
            <div class="input-area">
                <input type="text" id="myMessage" placeholder="Digite sua mensagem..." autocomplete="off">
                <button id="sendBtn">Enviar</button>
                <button id="leaveBtn" class="btn-secondary">Sair</button>
                <button id="crashBtn" class="btn-danger">Derrubar</button>
            </div>
        </div>

        <div class="users-panel">
            <h4 class="users-list-title">Usuários Online</h4>
            <ul id="onlineUsersList" class="online-users-list">
                </ul>
        </div>
        
    </div>


       
</body>
</html>
