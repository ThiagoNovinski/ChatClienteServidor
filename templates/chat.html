<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sala Global</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="card-container">
        <div class="chat-header">
            <div id="headerContent">
                <h2>Conectando...</h2>
            </div>
        </div>
        
        <div class="chat-body-container">
            <ul id="messages" class="messages-column"></ul>
            
            <div class="users-column">
                <h4 class="users-list-title">Usuários Online</h4>
                <ul id="onlineUsersList" class="online-users-list">
                    </ul>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="myMessage" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendBtn">Enviar</button>
            <button id="leaveBtn" style="background-color: #6c757d; margin-left: 10px;">Sair</button>
            <button id="crashBtn" style="background-color: #ff3333; margin-left: 10px;">Derrubar</button>
        </div>
    </div>

    <script>
        // --- 1. VERIFICAÇÃO DE SEGURANÇA ---
        // Pega os dados do Storage
        const myName = sessionStorage.getItem('chat_username');
        const myColor = sessionStorage.getItem('chat_color');

        // PROTEÇÃO CRÍTICA: Se não tem nome, cospe o usuário de volta pro Login
        // Como o Vercel está com o login na raiz, redirecionamos para "/"
        if (!myName) {
            console.error("Nenhum nome de usuário encontrado. Redirecionando para o login.");
            window.location.href = "/";
        }

        // --- 2. VARIÁVEIS DE CONEXÃO E UI ---
        let socket;
        let tentativaReconexao;
        let saindoDeProposito = false;
        
        const inputArea = document.getElementById('myMessage');
        const messagesList = document.getElementById('messages');
        const headerContent = document.getElementById('headerContent');
        const sendBtn = document.getElementById('sendBtn');
        const crashBtn = document.getElementById('crashBtn');

        // --- 3. LÓGICA DO WEBSOCKET (THREAD DO CLIENTE) ---
        function conectarServidor() {
            // URL SEGURA DO SEU BACK-END NO RENDER
            socket = new WebSocket('wss://chatclienteservidor.onrender.com'); 

            socket.onopen = function() {
                clearInterval(tentativaReconexao);
                sendBtn.disabled = false;
                crashBtn.disabled = false;

                // Apresentação: Manda o nome para o Python para ser listado como online
                socket.send(JSON.stringify({ tipo: "join", user: myName }));
            };

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);

                // TRATAMENTO DOS TIPOS DE MENSAGEM
                if (data.tipo === "sistema") {
                    // Atualiza o cabeçalho com os TIDs (prova de concorrência)
                    headerContent.innerHTML = `
                        <h2 style="margin-bottom: 5px;">User: ${myName}</h2>
                        <p style="font-size: 14px; color: #a0a0b0;">
                            <b>Thread do Servidor:</b> ${data.tid_servidor} | <b>Sua Thread:</b> ${data.tid_cliente}
                        </p>
                    `;
                } 
                else if (data.tipo === "chat") {
                    // Renderiza uma mensagem de texto normal no chat
                    const li = document.createElement('li');
                    li.innerHTML = `<span class="user-name" style="color: ${data.color};">${data.user}:</span> <span class="user-msg">${data.text}</span>`;
                    messagesList.appendChild(li);
                    // Scroll automático para a última mensagem
                    messagesList.scrollTop = messagesList.scrollHeight;

                    // Comando de tolerância a falhas: O servidor mandou desconectar
                    if (data.comando === "forcar_desconexao") {
                        socket.close(); // Isso aciona o socket.onclose()
                    }
                }
                // NOVIDADE: O Python mandou a lista atualizada de usuários online
                else if (data.tipo === "lista_usuarios") {
                    const onlineUl = document.getElementById('onlineUsersList');
                    onlineUl.innerHTML = ''; // Limpa a lista anterior
                    
                    data.usuarios.forEach(usuario => {
                        const li = document.createElement('li');
                        li.textContent = "🟢 " + usuario; // Adiciona uma bolinha verde estilosa
                        onlineUl.appendChild(li);
                    });
                }
            };

            socket.onclose = function() {
                // Se o usuário clicou em sair de propósito, não tenta reconectar
                if (saindoDeProposito) return; 

                // Estado de Conexão Perdida (Tolerância a falhas no cliente)
                headerContent.innerHTML = `<h2 style="color: #ff3333;">Conexão Perdida. Reconectando...</h2>`;
                sendBtn.disabled = true;
                crashBtn.disabled = true;

                // Rotina de auto-reconexão a cada 3 segundos
                clearInterval(tentativaReconexao);
                tentativaReconexao = setInterval(conectarServidor, 3000);
            };
        }

        // Inicia a conexão ao carregar a página
        conectarServidor();

        // ---- 4. EVENTOS DE BOTÃO E TECLADO ----

        function sendMessage() {
            const msgText = inputArea.value.trim();
            if (msgText !== "" && socket.readyState === WebSocket.OPEN) {
                // Envia a mensagem no formato que o Python espera
                socket.send(JSON.stringify({ user: myName, color: myColor, text: msgText }));
                inputArea.value = '';
            }
        }

        // Botão Sair
        const leaveBtn = document.getElementById('leaveBtn');
        leaveBtn.addEventListener('click', function() {
            saindoDeProposito = true; // Desativa a tolerância a falhas
            sessionStorage.clear(); // Limpa a identidade
            if (socket) socket.close(); // Corta a conexão TCP
            window.location.href = "/"; // Volta pro login
        });

        // Botão Enviar e Tecla Enter
        sendBtn.addEventListener('click', sendMessage);
        inputArea.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        // Botão Derrubar (Simulação de Falha Crítica para o Mestre do Python)
        crashBtn.addEventListener('click', function() {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ tipo: "crash" }));
            }
        });

        // Coloca o foco no input
        inputArea.focus();
    </script>
</body>
</html>
