<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <!-- Título exibido na aba -->
    <title>Sala Global</title>

    <!-- Arquivo de estilos -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- Container principal do chat -->
    <div class="card-container">

        <!-- Cabeçalho -->
        <div class="chat-header">

            <!-- Área onde serão exibidas as informações da conexão -->
            <div id="headerContent">
                <h2>Conectando...</h2>
            </div>

        </div>

        <!-- Área central do chat -->
        <div class="chat-body-container">

            <!-- Coluna das mensagens -->
            <ul id="messages" class="messages-column"></ul>

            <!-- Coluna lateral de usuários online -->
            <div class="users-column">

                <h4 class="users-list-title">
                    Usuários Online
                </h4>

                <!-- Lista preenchida dinamicamente -->
                <ul 
                    id="onlineUsersList"
                    class="online-users-list"
                >
                </ul>

            </div>
        </div>

        <!-- Área inferior de envio -->
        <div class="input-area">

            <!-- Campo de digitação -->
            <input 
                type="text"
                id="myMessage"
                placeholder="Digite sua mensagem..."
                autocomplete="off"
            >

            <!-- Botão de enviar -->
            <button id="sendBtn">
                Enviar
            </button>

            <!-- Botão para sair -->
            <button 
                id="leaveBtn"
                style="background-color: #6c757d; margin-left: 10px;"
            >
                Sair
            </button>

            <!-- Botão para simular queda do servidor -->
            <button 
                id="crashBtn"
                style="background-color: #ff3333; margin-left: 10px;"
            >
                Derrubar
            </button>

        </div>
    </div>

    <script>

        // Recupera dados do usuário salvos no navegador
        const myName = sessionStorage.getItem('chat_username');

        const myColor = sessionStorage.getItem('chat_color');

        // Se não houver usuário salvo,
        // volta para a tela inicial
        if (!myName) {
            window.location.href = "/";
        }

        let socket;

        // Interval usado na reconexão automática
        let tentativaReconexao;

        // Controla se o usuário saiu manualmente
        let saindoDeProposito = false;

        // Elementos da interface
        const inputArea =
            document.getElementById('myMessage');

        const messagesList =
            document.getElementById('messages');

        const headerContent =
            document.getElementById('headerContent');

        const sendBtn =
            document.getElementById('sendBtn');

        const crashBtn =
            document.getElementById('crashBtn');

        // --------------------------------------------------
        // CONEXÃO COM O SERVIDOR
        // --------------------------------------------------
        function conectarServidor() {

            // Cria conexão websocket
            socket = new WebSocket(
                'wss://chatclienteservidor.onrender.com'
            );

            // Evento executado ao conectar
            socket.onopen = function() {

                // Cancela tentativas anteriores
                clearInterval(tentativaReconexao);

                // Reativa os botões
                sendBtn.disabled = false;
                crashBtn.disabled = false;

                // Envia apresentação do usuário
                socket.send(JSON.stringify({
                    tipo: "join",
                    user: myName
                }));
            };

            // Evento executado ao receber mensagens
            socket.onmessage = function(event) {

                const data = JSON.parse(event.data);

                // -------------------------------
                // MENSAGEM DE SISTEMA
                // -------------------------------
                if (data.tipo === "sistema") {

                    // Atualiza informações do cabeçalho
                    headerContent.innerHTML = `
                        <h2 style="margin-bottom: 5px;">
                            User: ${myName}
                        </h2>

                        <p style="
                            font-size: 14px;
                            color: #a0a0b0;
                            margin: 0;
                        ">
                            <b>Processo Servidor:</b> ${data.pid_servidor} | 
                            <b>Sua Thread:</b> ${data.tid_cliente}
                        </p>
                    `;
                }

                // -------------------------------
                // MENSAGENS DO CHAT
                // -------------------------------
                else if (data.tipo === "chat") {

                    // Cria elemento da mensagem
                    const li = document.createElement('li');

                    li.innerHTML = `
                        <span
                            class="user-name"
                            style="color: ${data.color};"
                        >
                            ${data.user}:
                        </span>

                        <span class="user-msg">
                            ${data.text}
                        </span>
                    `;

                    // Adiciona no chat
                    messagesList.appendChild(li);

                    // Faz scroll automático
                    messagesList.scrollTop =
                        messagesList.scrollHeight;

                    // Caso o servidor mande fechar conexão
                    if (data.comando === "forcar_desconexao") {

                        socket.close();
                    }
                }

                // -------------------------------
                // LISTA DE USUÁRIOS ONLINE
                // -------------------------------
                else if (data.tipo === "lista_usuarios") {

                    const onlineUl =
                        document.getElementById(
                            'onlineUsersList'
                        );

                    // Limpa lista atual
                    onlineUl.innerHTML = '';

                    // Adiciona todos os usuários recebidos
                    data.usuarios.forEach(usuario => {

                        const li =
                            document.createElement('li');

                        li.innerHTML = `
                            <span style="
                                color: #4CAF50;
                                margin-right: 8px;
                            ">
                                ●
                            </span>

                            ${usuario}
                        `;

                        onlineUl.appendChild(li);
                    });
                }
            };

            // Evento executado quando a conexão cai
            socket.onclose = function() {

                // Se o usuário saiu manualmente,
                // não tenta reconectar
                if (saindoDeProposito) {
                    return;
                }

                // Atualiza mensagem do cabeçalho
                headerContent.innerHTML = `
                    <h2 style="color: #ff3333;">
                        Conexão Perdida. Reconectando...
                    </h2>
                `;

                // Desativa os botões temporariamente
                sendBtn.disabled = true;
                crashBtn.disabled = true;

                // Evita múltiplos intervals simultâneos
                clearInterval(tentativaReconexao);

                // Tenta reconectar a cada 3 segundos
                tentativaReconexao = setInterval(
                    conectarServidor,
                    3000
                );
            };
        }

        // Faz a primeira conexão
        conectarServidor();

        // --------------------------------------------------
        // ENVIO DE MENSAGENS
        // --------------------------------------------------
        function sendMessage() {

            // Texto digitado pelo usuário
            const msgText =
                inputArea.value.trim();

            // Só envia se houver texto
            // e a conexão estiver ativa
            if (
                msgText !== "" &&
                socket.readyState === WebSocket.OPEN
            ) {

                socket.send(JSON.stringify({
                    user: myName,
                    color: myColor,
                    text: msgText
                }));

                // Limpa o campo após enviar
                inputArea.value = '';
            }
        }

        // --------------------------------------------------
        // BOTÃO DE SAIR
        // --------------------------------------------------
        document
            .getElementById('leaveBtn')
            .addEventListener('click', function() {

                // Marca saída manual
                saindoDeProposito = true;

                // Limpa dados do navegador
                sessionStorage.clear();

                // Fecha conexão websocket
                if (socket) {
                    socket.close();
                }

                // Retorna para tela inicial
                window.location.href = "/";
            });

        // --------------------------------------------------
        // EVENTOS DE ENVIO
        // --------------------------------------------------

        // Clique no botão enviar
        sendBtn.addEventListener(
            'click',
            sendMessage
        );

        // Envia pressionando Enter
        inputArea.addEventListener(
            'keypress',
            e => {

                if (e.key === 'Enter') {
                    sendMessage();
                }
            }
        );

        // --------------------------------------------------
        // BOTÃO DE DERRUBAR SERVIDOR
        // --------------------------------------------------
        document
            .getElementById('crashBtn')
            .addEventListener('click', function() {

                // Envia comando especial de crash
                if (
                    socket.readyState === WebSocket.OPEN
                ) {

                    socket.send(JSON.stringify({
                        tipo: "crash"
                    }));
                }
            });

        // Já deixa o cursor no input
        inputArea.focus();

    </script>

</body>
</html>
