<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <!-- Título da aba -->
    <title>Sala Global</title>

    <!-- Arquivo de estilos -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- Container principal do chat -->
    <div class="card-container">

        <!-- Cabeçalho -->
        <div class="chat-header">

            <!-- Área onde serão exibidas as infos da conexão -->
            <div id="headerContent">
                <h2>Conectando...</h2>
            </div>

        </div>

        <!-- Lista onde as mensagens serão adicionadas -->
        <ul id="messages" class="messages-list"></ul>

        <!-- Área inferior de envio -->
        <div class="input-area">

            <!-- Campo de digitação -->
            <input 
                type="text"
                id="myMessage"
                placeholder="Digite sua mensagem..."
                autocomplete="off"
            >

            <!-- Botão de enviar -->
            <button id="sendBtn">
                Enviar
            </button>

            <!-- Botão para sair da sala -->
            <button 
                id="leaveBtn"
                style="background-color: #6c757d; margin-left: 10px;"
            >
                Sair
            </button>

            <!-- Botão que simula a queda do servidor -->
            <button 
                id="crashBtn"
                style="background-color: #ff3333; margin-left: 10px;"
            >
                Derrubar
            </button>

        </div>
    </div>

    <script>

        // Recupera os dados salvos no login
        const myName = sessionStorage.getItem('chat_username');
        const myColor = sessionStorage.getItem('chat_color');

        // Se não existir usuário salvo, volta para o login
        if (!myName) {
            window.location.href = "login.html";
        }

        let socket;

        // Guarda o intervalo usado na reconexão automática
        let tentativaReconexao;

        // Controla se o usuário saiu manualmente
        let saindoDeProposito = false;

        // Elementos da interface
        const inputArea = document.getElementById('myMessage');
        const messagesList = document.getElementById('messages');
        const headerContent = document.getElementById('headerContent');

        const sendBtn = document.getElementById('sendBtn');
        const crashBtn = document.getElementById('crashBtn');

        // --------------------------------------------------
        // FUNÇÃO RESPONSÁVEL PELA CONEXÃO COM O SERVIDOR
        // --------------------------------------------------
        function conectarServidor() {

            // Cria conexão websocket com o servidor
            socket = new WebSocket(
                'wss://chatclienteservidor.onrender.com'
            );

            // Evento executado quando conecta
            socket.onopen = function() {

                // Cancela tentativas de reconexão
                clearInterval(tentativaReconexao);

                // Reativa os botões
                sendBtn.disabled = false;
                crashBtn.disabled = false;

                // Se apresenta para o servidor ao conectar
                socket.send(JSON.stringify({
                    tipo: "join",
                    user: myName
                }));
            };

            // Evento executado quando chega mensagem
            socket.onmessage = function(event) {

                const data = JSON.parse(event.data);

                // Mensagem de sistema com dados das threads
                if (data.tipo === "sistema") {

                    headerContent.innerHTML = `
                        <h2 style="margin-bottom: 5px;">
                            User: ${myName}
                        </h2>

                        <p style="font-size: 14px; color: #a0a0b0;">
                            <b>Thread do Servidor:</b> ${data.tid_servidor}
                            |
                            <b>Sua Thread:</b> ${data.tid_cliente}
                        </p>
                    `;
                }

                // Mensagem comum do chat
                else if (data.tipo === "chat") {

                    // Cria novo item da lista
                    const li = document.createElement('li');

                    li.innerHTML = `
                        <span 
                            class="user-name"
                            style="color: ${data.color};"
                        >
                            ${data.user}:
                        </span>

                        <span class="user-msg">
                            ${data.text}
                        </span>
                    `;

                    // Adiciona mensagem no chat
                    messagesList.appendChild(li);

                    // Faz scroll automático para baixo
                    messagesList.scrollTop =
                        messagesList.scrollHeight;

                    // Caso o servidor mande ordem de desconexão,
                    // fecha o socket imediatamente
                    if (data.comando === "forcar_desconexao") {
                        socket.close();
                    }
                }
            };

            // Evento executado quando a conexão cai
            socket.onclose = function() {

                // Se o usuário saiu manualmente,
                // não tenta reconectar
                if (saindoDeProposito) {
                    return;
                }

                // Atualiza o cabeçalho
                headerContent.innerHTML = `
                    <h2 style="color: #ff3333;">
                        Conexão Perdida. Reconectando...
                    </h2>
                `;

                // Desativa botões enquanto estiver offline
                sendBtn.disabled = true;
                crashBtn.disabled = true;

                // Evita múltiplos intervals ao mesmo tempo
                clearInterval(tentativaReconexao);

                // Tenta reconectar a cada 3 segundos
                tentativaReconexao = setInterval(
                    conectarServidor,
                    3000
                );
            };
        }

        // Faz a primeira conexão ao abrir a página
        conectarServidor();

        // --------------------------------------------------
        // ENVIO DE MENSAGENS
        // --------------------------------------------------
        function sendMessage() {

            // Pega o texto digitado
            const msgText = inputArea.value.trim();

            // Só envia se houver texto
            // e a conexão estiver aberta
            if (
                msgText !== "" &&
                socket.readyState === WebSocket.OPEN
            ) {

                socket.send(JSON.stringify({
                    user: myName,
                    color: myColor,
                    text: msgText
                }));

                // Limpa o input após enviar
                inputArea.value = '';
            }
        }

        // --------------------------------------------------
        // BOTÃO DE SAIR
        // --------------------------------------------------
        const leaveBtn = document.getElementById('leaveBtn');

        leaveBtn.addEventListener('click', function() {

            // Marca que o usuário saiu manualmente
            saindoDeProposito = true;

            // Remove dados do navegador
            sessionStorage.clear();

            // Fecha a conexão
            if (socket) {
                socket.close();
            }

            // Volta para tela inicial
            window.location.href = "/";
        });

        // --------------------------------------------------
        // EVENTOS DO BOTÃO DE ENVIAR
        // --------------------------------------------------

        sendBtn.addEventListener('click', sendMessage);

        // Permite enviar pressionando Enter
        inputArea.addEventListener('keypress', e => {

            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // --------------------------------------------------
        // BOTÃO DE DERRUBAR SERVIDOR
        // --------------------------------------------------
        crashBtn.addEventListener('click', function() {

            // Envia comando especial para derrubar o servidor
            if (socket.readyState === WebSocket.OPEN) {

                socket.send(JSON.stringify({
                    tipo: "crash"
                }));
            }
        });

        // Deixa o cursor já focado no input
        inputArea.focus();

    </script>

</body>
</html>
