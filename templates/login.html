<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Entrar no Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="card-container">
        <div class="chat-header"><h2>Bem-vindo ao Chat</h2></div>
        <div class="login-body">
            <p>Por favor, identifique-se para entrar na sala.</p>
            <input type="text" id="usernameInput" placeholder="Seu nome..." autocomplete="off">
            <button id="joinBtn">Entrar na Sala</button>
        </div>
    </div>

    <script>
        function joinChat() {
            const name = document.getElementById('usernameInput').value.trim();
            if (name !== "") {
                const randomHue = Math.floor(Math.random() * 360);
                const color = `hsl(${randomHue}, 80%, 70%)`;
                sessionStorage.setItem('chat_username', name);
                sessionStorage.setItem('chat_color', color);
                window.location.href = "chat.html"; // Vai direto pro outro HTML
            }
        }
        document.getElementById('joinBtn').addEventListener('click', joinChat);
        document.getElementById('usernameInput').addEventListener('keypress', e => { if (e.key === 'Enter') joinChat(); });
    </script>
</body>
</html>
