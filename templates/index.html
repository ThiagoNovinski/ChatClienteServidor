<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Cliente-Servidor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <div id="login-screen" class="card-container">
        <div class="chat-header">
            <h2>Bem-vindo ao Chat</h2>
        </div>
        <div class="login-body">
            <p>Por favor, identifique-se para entrar na sala.</p>
            <input type="text" id="usernameInput" placeholder="Seu nome..." autocomplete="off">
            <button id="joinBtn">Entrar na Sala</button>
        </div>
    </div>

    <div id="chat-screen" class="card-container" style="display: none;">
        <div class="chat-header">
            <h2>Sala Global</h2>
        </div>
        <ul id="messages" class="messages-list"></ul>
        <div class="input-area">
            <input type="text" id="myMessage" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = ""; 
        let myColor = ""; // Nova variável para guardar a cor do usuário

        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const usernameInput = document.getElementById('usernameInput');
        const joinBtn = document.getElementById('joinBtn');

        // Função de Login
        function joinChat() {
            const name = usernameInput.value.trim();
            if (name !== "") {
                myName = name;
                
                // Gera uma cor aleatória em HSL
                // Hue (Matiz) vai de 0 a 360 graus. 
                // Saturation em 80% e Lightness em 70% garantem cores vivas que combinam com o modo escuro.
                const randomHue = Math.floor(Math.random() * 360);
                myColor = `hsl(${randomHue}, 80%, 70%)`;

                loginScreen.style.display = 'none';
                chatScreen.style.display = 'flex';
                
                // Opcional: Focar direto no campo de mensagem ao entrar
                document.getElementById('myMessage').focus();
            }
        }

        joinBtn.addEventListener('click', joinChat);
        usernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') joinChat();
        });


        // Função do Chat
        const inputArea = document.getElementById('myMessage');
        const sendBtn = document.getElementById('sendBtn');
        const messagesList = document.getElementById('messages');

        // Recebe mensagens
        socket.on('message', function(data) {
            const li = document.createElement('li');
            
            // Aqui aplicamos a cor recebida do servidor diretamente no estilo (inline CSS)
            li.innerHTML = `<span class="user-name" style="color: ${data.color};">${data.user}:</span> <span class="user-msg">${data.text}</span>`;
            
            messagesList.appendChild(li);
            messagesList.scrollTop = messagesList.scrollHeight;
        });

        // Envia mensagens
        function sendMessage() {
            const msgText = inputArea.value.trim();
            if (msgText !== "") {
                // Agora o pacote enviado contém 3 informações
                const messageData = {
                    user: myName,
                    color: myColor,
                    text: msgText
                };
                socket.send(messageData);
                inputArea.value = '';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputArea.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
