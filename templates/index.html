<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sala Global</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2>Bem-vindo ao Chat</h2>
            <p>Por favor, identifique-se para entrar na sala.</p>
        </div>
        
        <div class="login-form">
            <input type="text" id="usernameInput" placeholder="Seu nome..." autocomplete="off">
            <button id="loginBtn">Entrar na Sala</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('usernameInput');
        const btn = document.getElementById('loginBtn');

        function entrar() {
            const nome = input.value.trim();
            if (nome !== "") {
                // Sorteia uma cor para o usuário
                const cores = ["#ff5555", "#55ff55", "#5555ff", "#ffff55", "#ff55ff", "#55ffff", "#ffaa00"];
                const corEscolhida = cores[Math.floor(Math.random() * cores.length)];
                
                sessionStorage.setItem('chat_username', nome);
                sessionStorage.setItem('chat_color', corEscolhida);
                
                // Redireciona para o chat (Ajuste para "/chat" ou "chat.html" conforme o seu Vercel exige)
                window.location.href = "/chat"; 
            }
        }

        btn.addEventListener('click', entrar);
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') entrar();
        });
        
        input.focus();
    </script>
</body>
</html>
