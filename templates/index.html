<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Cliente-Servidor</title>
    <!-- O Flask busca arquivos estáticos na pasta 'static' -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Biblioteca Socket.IO client-side -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Chat Global</h2>
        </div>
        <div class="chat-messages" id="messages">
            <!-- Mensagens aparecerão aqui -->
        </div>
        <div class="chat-input">
            <input type="text" id="myMessage" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script>
        // Estabelece a conexão com o servidor WebSocket
        const socket = io();

        const sendBtn = document.getElementById('sendBtn');
        const myMessage = document.getElementById('myMessage');
        const messages = document.getElementById('messages');

        // Função para enviar mensagem ao servidor
        function sendMessage() {
            if (myMessage.value.trim() !== '') {
                socket.send(myMessage.value);
                myMessage.value = '';
            }
        }

        // Listener para o botão de envio e tecla Enter
        sendBtn.addEventListener('click', sendMessage);
        myMessage.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Escuta mensagens recebidas do servidor e injeta no HTML
        socket.on('message', function(msg) {
            const msgElement = document.createElement('div');
            msgElement.classList.add('message');
            msgElement.innerText = msg;
            messages.appendChild(msgElement);
            // Rola para o final automaticamente
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
